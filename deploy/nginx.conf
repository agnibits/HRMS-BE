# Reverse proxy: internet (port 80) -> API container (port 4000).
# Plain HTTP for IP-based access. To add a domain + HTTPS later, put certs in
# and add a `listen 443 ssl;` server block (see DEPLOY.md).

upstream hrms_api {
    server api:4000;
}

server {
    listen 80 default_server;
    server_name _;

    # Allow file uploads (bulk import, documents) up to 20 MB.
    client_max_body_size 20m;

    # Standard proxy headers so the app sees the real client IP/scheme
    # (TRUST_PROXY=true honors X-Forwarded-* from this proxy).
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;

    # Health check straight through.
    location = /health {
        proxy_pass http://hrms_api;
        access_log off;
    }

    # Socket.io (WebSocket upgrade).
    location /socket.io/ {
        proxy_pass http://hrms_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Everything else -> API.
    location / {
        proxy_pass http://hrms_api;
    }
}
